<!DOCTYPE html>
<html>
<head>
  <title>Checkout | MSquare Sports</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Checkout</h2>

<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<textarea id="address" placeholder="Address"></textarea><br><br>

<button onclick="placeOrder()">Place Order (WhatsApp)</button>

<script>
function placeOrder() {
  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let address = document.getElementById("address").value.trim();
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (!name || !phone || !address) {
    alert("Please fill all details");
    return;
  }

  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  let msg = "🛒 *New Order* %0A%0A";
  msg += `👤 Name: ${name}%0A`;
  msg += `📞 Phone: ${phone}%0A`;
  msg += `🏠 Address: ${address}%0A%0A`;
  msg += "📦 Items:%0A";

  cart.forEach(i => {
    msg += `• ${i.name} - ₹${i.price}%0A`;
  });

  localStorage.removeItem("cart");

  window.location.href =
    "https://wa.me/9035202055?text=" + msg;
}
</script>

</body>
</html>
