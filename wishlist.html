<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wishlist | Msquare Sports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .wishlist-page {
      padding: 80px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .wishlist-page h1 {
      margin-bottom: 20px;
      font-family: Poppins, sans-serif;
    }

    .empty-wishlist {
      text-align: center;
      color: #777;
      margin-top: 80px;
    }

    .empty-wishlist i {
      font-size: 50px;
      color: #e11d48;
      margin-bottom: 15px;
    }

    .back-btn {
      display: inline-block;
      margin-top: 30px;
      text-decoration: none;
      color: #d4af37;
    }
  </style>
</head>
<body>

<nav class="main-nav">
  <div class="brand-wrapper logo-text">
    <span class="logo-white">MSQUARE</span>
    <span class="logo-yellow">SPORTS</span>
  </div>
</nav>

<section class="wishlist-page">
  <h1>Your Wishlist</h1>

  <div class="empty-wishlist">
    <i class="fa-solid fa-heart"></i>
    <p>Your wishlist is empty</p>
    <a class="back-btn" href="index.html">← Continue shopping</a>
  </div>
</section>

</body>
</html>
